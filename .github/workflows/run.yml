name: 'GitHub Actions CloudFlare2DNSPod Bot'

on:
  push:
    branches: 
      - main
  repository_dispatch:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v3
      
      - name: 'Set up Python'
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: 'Install dependencies'
        run: |
          pip install -r requirements.txt >/dev/null 2>&1 || {
            echo "::error::依赖安装失败"
            exit 1
          }
        shell: bash
      
      - name: 'Run cf2dns'
        env:
          CONFIG: ${{ secrets.CONFIG }}
          DOMAINS: ${{ vars.DOMAINS }}
          PROVIDER: ${{ secrets.PROVIDER }}
          IPV4_CIDRS: ${{ vars.IPV4_CIDRS }}
          IPV6_CIDRS: ${{ vars.IPV6_CIDRS }}
          GITHUB_ACTIONS: true
        run: |
          python cf2dns_actions.py > /dev/null 2>&1 || {
            echo "::error::cf2dns 执行失败"
            exit 1
          }
        shell: bash
