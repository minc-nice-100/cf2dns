name: 'GitHub Actions CloudFlare2DNSPod Bot'

on:
  push:
    branches: 
      - main
  repository_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v3
      
      - name: 'Set up Python'
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'  # 启用pip缓存

          
      - name: 'Install dependencies'
        run: |
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          fi
      
      - name: 'run cf2dns'
        run: |
          export CONFIG="${{ secrets.CONFIG }}" \
                 DOMAINS="${{ vars.DOMAINS }}" \
                 PROVIDER="${{ secrets.PROVIDER }}" \
                 IPV4_CIDRS="${{ vars.IPV4_CIDRS }}" \
                 IPV6_CIDRS="${{ vars.IPV6_CIDRS }}"
          python cf2dns_actions.py > /dev/null
